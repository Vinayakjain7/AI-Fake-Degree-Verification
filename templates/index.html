<!DOCTYPE html>
<html>
<head>
    <title>AI Certificate Verification</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;

            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1e3c72);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.08);
            padding: 50px;
            width: 480px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .glow-logo {
            animation: pulseGlow 2.5s infinite ease-in-out;
            margin-bottom: 20px;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(0,200,255,0.9)); transform: scale(1.08); }
            100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        }

        button {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .dark-mode {
            background: linear-gradient(-45deg, #000000, #1f1f1f, #2c3e50);
        }
    </style>
</head>

<body>

<div id="particles-js"></div>

<button class="toggle-btn" onclick="toggleDarkMode()">🌙</button>

<div class="container">

    <svg width="80" height="80" viewBox="0 0 64 64" fill="none" class="glow-logo">
        <path d="M32 4L56 12V28C56 42 44 54 32 60C20 54 8 42 8 28V12L32 4Z"
              stroke="white" stroke-width="3"/>
        <circle cx="32" cy="28" r="8" stroke="white" stroke-width="2"/>
        <path d="M32 20V36" stroke="white" stroke-width="2"/>
    </svg>

    <h1>AI Certificate Verification</h1>
    <p>Secure • Intelligent • Trusted Platform</p>

    <form action="/verify" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required><br><br>
        <button type="submit">Verify Certificate</button>
    </form>

    <br>
    <a href="/admin" style="color:white;">Admin Dashboard</a>

</div>

<script>
particlesJS("particles-js", {
    particles: {
        number: { value: 80 },
        size: { value: 3 },
        move: { speed: 1 },
        line_linked: { enable: true },
        opacity: { value: 0.5 }
    }
});

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
